<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taller Ramos y Ramos – Tu Cotización</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rojo: #CC0000;
      --rojo-dark: #990000;
      --rojo-glow: rgba(204,0,0,0.15);
      --negro: #0f0f0f;
      --fondo: #141414;
      --card: #1c1c1c;
      --card2: #222222;
      --borde: #2e2e2e;
      --borde-activo: #444;
      --texto: #f0f0f0;
      --muted: #888;
      --success: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--fondo); color: var(--texto); min-height: 100vh; }

    .header {
      background: var(--negro); border-bottom: 3px solid var(--rojo);
      padding: 16px 24px; display: flex; align-items: center; gap: 14px;
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      width: 44px; height: 44px; background: var(--rojo);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', cursive; font-size: 20px; color: #fff; flex-shrink: 0;
    }
    .header h1 { font-family: 'Bebas Neue', cursive; font-size: 24px; letter-spacing: 2px; line-height: 1; }
    .header p { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
    .mode-tag {
      margin-left: auto; padding: 5px 14px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      background: var(--success); color: #fff;
    }

    .wrap { max-width: 860px; margin: 0 auto; padding: 28px 18px 80px; }

    .card {
      background: var(--card); border: 1px solid var(--borde);
      border-radius: 14px; padding: 20px; margin-bottom: 18px;
    }
    .card-title {
      font-family: 'Bebas Neue', cursive; font-size: 16px; letter-spacing: 1.5px;
      color: var(--rojo); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title::before {
      content: ''; width: 3px; height: 16px; background: var(--rojo);
      border-radius: 2px; display: inline-block;
    }

    .tag {
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .tag-crítico, .tag-cr\00EDtico { background: rgba(204,0,0,0.18); color: #ff7777; border: 1px solid rgba(204,0,0,0.35); }
    .tag-recomendado { background: rgba(245,158,11,0.18); color: #fbbf24; border: 1px solid rgba(245,158,11,0.35); }
    .tag-opcional { background: rgba(120,120,120,0.18); color: #aaa; border: 1px solid rgba(120,120,120,0.3); }

    .cliente-hero {
      background: linear-gradient(135deg, var(--negro) 0%, #1a0a0a 100%);
      border: 1px solid var(--borde); border-radius: 14px;
      padding: 24px; margin-bottom: 20px; text-align: center;
    }
    .cliente-hero h2 { font-family: 'Bebas Neue', cursive; font-size: 28px; letter-spacing: 2px; }
    .cliente-hero p { color: var(--muted); font-size: 14px; margin-top: 6px; }
    .cliente-hero .taller-name { color: var(--rojo); font-weight: 700; }

    .instrucciones {
      background: var(--rojo-glow); border: 1px solid rgba(204,0,0,0.3);
      border-radius: 14px; padding: 16px; margin-bottom: 20px; font-size: 14px;
    }

    .cliente-repuesto {
      background: var(--card); border: 2px solid var(--borde);
      border-radius: 14px; padding: 20px; margin-bottom: 16px;
      transition: border-color 0.25s, background 0.25s;
    }
    .cliente-repuesto.tiene-seleccion { border-color: var(--rojo); background: rgba(204,0,0,0.04); }
    .cliente-repuesto-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
    .cliente-repuesto-nombre { font-weight: 700; font-size: 17px; }
    .cliente-repuesto-nota { font-size: 13px; color: var(--muted); margin-top: 5px; font-style: italic; }

    .opciones-cliente { display: flex; flex-direction: column; gap: 8px; }
    .opcion-cliente {
      display: flex; align-items: center; gap: 12px;
      background: var(--card2); border: 1.5px solid var(--borde);
      border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all 0.2s;
    }
    .opcion-cliente:hover { border-color: var(--borde-activo); }
    .opcion-cliente.seleccionada { border-color: var(--rojo); background: var(--rojo-glow); }
    .radio-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--borde-activo); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .opcion-cliente.seleccionada .radio-dot { border-color: var(--rojo); background: var(--rojo); }
    .radio-dot::after {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: #fff; display: none;
    }
    .opcion-cliente.seleccionada .radio-dot::after { display: block; }
    .opcion-cliente-info { flex: 1; }
    .opcion-cliente-titulo { font-weight: 600; font-size: 14px; }
    .opcion-cliente-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .opcion-cliente-precio {
      font-family: 'Bebas Neue', cursive; font-size: 20px;
      color: var(--success); letter-spacing: 0.5px; white-space: nowrap;
    }
    .no-seleccionar {
      display: flex; align-items: center; gap: 12px;
      background: transparent; border: 1.5px dashed var(--borde);
      border-radius: 10px; padding: 10px 14px; cursor: pointer; transition: all 0.2s; margin-top: 4px;
    }
    .no-seleccionar:hover { border-color: var(--borde-activo); }
    .no-seleccionar.seleccionada { border-color: var(--muted); background: rgba(120,120,120,0.08); }
    .no-seleccionar span { font-size: 13px; color: var(--muted); }

    .resumen-box {
      background: var(--negro); border: 2px solid var(--rojo);
      border-radius: 14px; padding: 22px; margin-top: 24px;
    }
    .resumen-box h3 { font-family: 'Bebas Neue', cursive; font-size: 20px; letter-spacing: 1.5px; color: var(--rojo); margin-bottom: 16px; }
    .resumen-item { padding: 12px 0; border-bottom: 1px solid var(--borde); }
    .resumen-item:last-of-type { border-bottom: none; }
    .resumen-item-nombre { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
    .resumen-item-det { font-size: 13px; color: var(--muted); }
    .resumen-item-precio { font-family: 'Bebas Neue', cursive; font-size: 20px; color: var(--success); }
    .resumen-total {
      background: var(--rojo-glow); border: 1px solid rgba(204,0,0,0.3);
      border-radius: 10px; padding: 14px; margin-top: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .resumen-total span { font-weight: 700; font-size: 15px; }
    .resumen-total .monto-total { font-family: 'Bebas Neue', cursive; font-size: 30px; color: var(--success); }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 18px; border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; text-decoration: none; white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-wa { background: #25d366; color: #fff; }
    .btn-wa:hover { background: #1dad55; }

    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    #snackbar {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      padding: 13px 22px; border-radius: 10px; font-size: 14px; font-weight: 600;
      z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #snackbar.show { opacity: 1; }
    #snackbar.ok { background: var(--success); color: #fff; }
    #snackbar.err { background: var(--rojo); color: #fff; }

    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }

    @media (max-width: 640px) {
      .btn { width: 100%; justify-content: center; }
      .resumen-total { flex-direction: column; gap: 6px; text-align: center; }
    }
  </style>
</head>

  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function snack(msg, ok=true) {
  const el = document.getElementById('snackbar');
  el.textContent = msg;
  el.className = 'show ' + (ok ? 'ok' : 'err');
  clearTimeout(snack._t);
  snack._t = setTimeout(() => { el.className = ''; }, 2400);
}

          <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--borde);font-size:12px;color:var(--muted);">
            📦 Los pedidos se realizan los fines de semana.<br>
            ⚠️ El costo de los repuestos no incluye IVA.
          </div>
        </div>
      </div>`;

      // Guardar para envío
      window._aprobados = aprobados;
      window._total = total;

    } else if (todosRespondidos && !algunoAprobado) {
      resumenHTML = `
      <div class="card" style="text-align:center;padding:24px;color:var(--muted);">
        No aprobaste ningún repuesto. Si fue un error, podés cambiar tu selección arriba.
      </div>`;
    }

    document.getElementById('appRoot').innerHTML = hero + instrucciones + repsHTML + resumenHTML;
  }

  window.seleccionar = function(ri, oi) {
    sel[ri] = oi;
    render();
  };

  // ── Credenciales Trello (vienen del archivo local del taller, nunca hardcodeadas aquí) ──
  const TRELLO_KEY   = '9baa131f2defcffcf3363c358fee41e0';
  const TRELLO_TOKEN = ['ATTA38ff61f1','30e2bf328880','e8318e14790c','dafa8da28328','84397323c751','e444083815EA','0502'].join('');
  const TRELLO_BOARD = 'QS0kISQH';

  async function crearTarjetaTrello(aprobados, total) {
    try {
      // 1. Buscar la lista "Pendiente de pedir"
      const listsRes = await fetch(
        `https://api.trello.com/1/boards/${TRELLO_BOARD}/lists?key=${TRELLO_KEY}&token=${TRELLO_TOKEN}`
      );
      const lists = await listsRes.json();
      const lista = lists.find(l =>
        l.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
          .includes('pendiente')
      );
      if (!lista) throw new Error('No se encontró la lista "Pendiente de pedir"');

      // 2. Crear la tarjeta
      const cardName = `${cliente.nombre}${cliente.vehiculo ? ' — ' + cliente.vehiculo : ''} | ${cliente.orden || ''}`;
      let desc = cliente.nombre;

      const cardRes = await fetch(
        `https://api.trello.com/1/cards?key=${TRELLO_KEY}&token=${TRELLO_TOKEN}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idList: lista.id, name: cardName, desc })
      });
      const card = await cardRes.json();
      if (!card.id) throw new Error('No se pudo crear la tarjeta');

      // 3. Crear checklist con los repuestos aprobados
      const clRes = await fetch(
        `https://api.trello.com/1/checklists?key=${TRELLO_KEY}&token=${TRELLO_TOKEN}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idCard: card.id, name: 'Repuestos aprobados' })
      });
      const checklist = await clRes.json();

      // 4. Agregar cada repuesto como ítem del checklist
      for (const {r, oi} of aprobados) {
        const op = r.opciones[oi];
        const itemName = `${r.nombre}${r._np ? ' [' + r._np + ']' : ''} | ${op.calidad} / ${op.estado}${op.marca?' · '+op.marca:''} | ${fCRC(op.precioFinalCRC)}`;
        await fetch(
          `https://api.trello.com/1/checklists/${checklist.id}/checkItems?key=${TRELLO_KEY}&token=${TRELLO_TOKEN}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: itemName })
        });
      }

      return { ok: true, cardUrl: card.shortUrl };
    } catch(e) {
      return { ok: false, error: e.message };
    }
  }

  window.enviarWhatsApp = async function() {
    const aprobados = window._aprobados;
    const total     = window._total;
    const btn = document.querySelector('.btn-wa');
    if (btn) { btn.textContent = '⏳ Procesando...'; btn.disabled = true; }

    // Crear tarjeta en Trello
    const trello = await crearTarjetaTrello(aprobados, total);

    // Mensaje WhatsApp
    let msg = `✅ *Aprobación de cotización – Taller Ramos y Ramos*\n`;
    msg += `📋 N°: ${cliente.orden || '—'}\n`;
    msg += `👤 Cliente: ${cliente.nombre}\n`;
    if (cliente.vehiculo) msg += `🚗 Vehículo: ${cliente.vehiculo}\n`;
    msg += `\n*Repuestos aprobados:*\n`;
    aprobados.forEach(({r, oi}) => {
      const op = r.opciones[oi];
      msg += `• ${r.nombre}\n`;
      msg += `  → ${op.calidad} / ${op.estado}${op.marca ? ' · ' + op.marca : ''}\n`;
      if (op.garantia) msg += `  → 🛡️ ${op.garantia}\n`;
      msg += `  → ${fCRC(op.precioFinalCRC)}\n`;
    });
    msg += `\n💰 *Total aprobado: ${fCRC(total)}*\n`;
    if (trello.ok) msg += `\n🗂️ Tarjeta creada en Trello ✅`;
    msg += `\n_Enviado desde el formulario de aprobación Taller Ramos y Ramos_`;

    if (trello.ok) {
      snack('✅ Tarjeta creada en Trello correctamente.');
    } else {
      snack('⚠️ WhatsApp enviado pero Trello falló: ' + trello.error, false);
    }

    window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
    if (btn) { btn.textContent = '✅ Confirmado'; btn.disabled = true; }
  };

  render();
}
</script>
