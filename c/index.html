<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taller Ramos y Ramos — Cargando cotización...</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: system-ui, sans-serif;
      color: #ccc;
      text-align: center;
    }
    .logo { font-size: 2.5rem; margin-bottom: 12px; }
    .msg  { font-size: 14px; color: #666; margin-top: 8px; }
    .sub  { font-size: 12px; color: #444; margin-top: 6px; }
    .err  { color: #e74c3c; }
  </style>
</head>
<body>
  <div>
    <div class="logo">🔧</div>
    <div id="msg" class="msg">Cargando tu cotización...</div>
    <div id="sub" class="sub"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const k = params.get('k');

    function mostrarError(txt) {
      document.getElementById('msg').innerHTML = '<span class="err">' + txt + '</span>';
      document.getElementById('sub').textContent = '';
    }

    async function cargar() {
      if (!k) { mostrarError('Link inválido o expirado.'); return; }

      const esOrden = /^OT-\d{6}-\d{3,}$/.test(k);

      if (esOrden) {
        const jsonUrl = 'https://api.github.com/repos/ramosyramos/Cotizacion/contents/data/' + k + '.json';
        const MAX_INTENTOS = 5;
        const ESPERA_MS    = 3000;

        for (let i = 1; i <= MAX_INTENTOS; i++) {
          try {
            document.getElementById('msg').textContent = 'Cargando tu cotización...';
            document.getElementById('sub').textContent = i > 1 ? 'Intento ' + i + ' de ' + MAX_INTENTOS + '...' : '';

            const res = await fetch(jsonUrl, { headers: { 'Accept': 'application/vnd.github.raw+json' } });
            if (res.ok) {
              const payload = await res.json();
              const encoded = btoa(encodeURIComponent(JSON.stringify(payload)));
              window.location.replace(
                'https://ramosyramos.github.io/Cotizacion/cliente.html?data=' + encoded
              );
              return;
            }
          } catch(e) {}

          if (i < MAX_INTENTOS) {
            // Esperar antes del siguiente intento con cuenta regresiva
            for (let s = Math.round(ESPERA_MS / 1000); s > 0; s--) {
              document.getElementById('sub').textContent = 'Reintentando en ' + s + 's... (' + i + '/' + MAX_INTENTOS + ')';
              await new Promise(r => setTimeout(r, 1000));
            }
          }
        }

        mostrarError('No se pudo cargar la cotización. Pedile al taller que te reenvíe el link.');
      } else {
        // Formato base64 directo
        try {
          JSON.parse(decodeURIComponent(atob(k)));
          window.location.replace(
            'https://ramosyramos.github.io/Cotizacion/cliente.html?data=' + k
          );
        } catch(e) {
          mostrarError('Link inválido o expirado.');
        }
      }
    }

    cargar();
  </script>
